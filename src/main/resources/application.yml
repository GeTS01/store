server:
  port: 8081

spring:
  application:
    name: store

  datasource:
    url: jdbc:postgresql://localhost:5432/store
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true